name: tools-present

on:
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Linux CI always builds the ha7ilm csdr fork — see research/csdr.md
      # for the per-platform fork selection rationale.
      NADIR_CSDR_FORK: ha7ilm
    steps:
      - uses: actions/checkout@v4

      - name: install linux tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            praat \
            build-essential \
            cmake \
            pkg-config \
            libfftw3-dev \
            libsamplerate0-dev \
            git

      - name: install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: run bootstrap
        run: bash scripts/bootstrap.sh
        # bootstrap builds mbrola, csdr (ha7ilm), opensmile, then cargo+uv.

      - name: verify — all five tools present
        run: bash scripts/check_tools.sh
