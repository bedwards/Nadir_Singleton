name: python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - name: sync
        working-directory: python
        run: uv sync
      - name: ruff
        working-directory: python
        run: uv run ruff check
      - name: pytest
        working-directory: python
        run: uv run pytest -q
