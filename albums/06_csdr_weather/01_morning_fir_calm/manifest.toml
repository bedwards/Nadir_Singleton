[track]
n = 1
slug = "01_morning_fir_calm"
title = "Morning FIR Calm"
key = "A"
scale = "minor"
bpm = 52
meter = [4, 4]
bars = 32
form = "through-composed"
mbrola_voice = ""

[narrative]
role = "opener; dawn air before the weather system arrives; stillness as empty FIR taps warming up"
motifs = ["m.room_impulse"]
carries = ["dsp_only", "dawn_calm"]
seeds_for = ["02_patterned_drizzle", "14_room_impulse_night"]

[targets]
tessitura_hz = [0, 0]
pitch_error_ceiling_cents = 0.0
vox_loudness_lufs = -24.0
spectral_slope_db_per_oct_target = -9.0
voicing_fraction_ceiling = 0.02

[dsp]
bed_preset = "fir_cascade"
bed_variation = "fir_cascade_calm_soft"
texture_preset = "shaped_noise_bed"
texture_variation = "shaped_noise_bed_narrow_low"
sample_source = "dirac_impulse_bed_sparse_long_ir"

[audit]
opensmile_config = "eGeMAPSv02"
audit_features = ["spectral_slope", "loudness", "band_limited_rms"]
