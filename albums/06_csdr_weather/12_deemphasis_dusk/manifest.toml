[track]
n = 12
slug = "12_deemphasis_dusk"
title = "Deemphasis Dusk"
key = "A"
scale = "minor"
bpm = 50
meter = [4, 4]
bars = 32
form = "through-composed"
mbrola_voice = ""

[narrative]
role = "light falls; the deemphasis chain is aimed at the high band so dusk softens the spectrum; the weather system retires"
motifs = ["m.room_impulse"]
carries = ["dsp_only", "dusk_spectrum"]

[targets]
tessitura_hz = [0, 0]
pitch_error_ceiling_cents = 0.0
vox_loudness_lufs = -21.0
spectral_slope_db_per_oct_target = -10.0
voicing_fraction_ceiling = 0.02

[dsp]
bed_preset = "deemphasis_chain"
bed_variation = "deemphasis_chain_dusk_deep"
texture_preset = "shaped_noise_bed"
texture_variation = "shaped_noise_bed_warm"
sample_source = "dirac_impulse_bed_sparse_long_ir"

[audit]
opensmile_config = "eGeMAPSv02"
audit_features = ["spectral_slope", "loudness", "band_limited_rms"]
