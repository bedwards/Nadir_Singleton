[track]
n = 1
slug = "01_a_window"
title = "A Window"
key = "F#"
scale = "minor"
bpm = 54
meter = [3, 4]
bars = 24
form = "through-composed"
mbrola_voice = "us1"

[narrative]
role = "we open the cycle on a single pane of glass; first light, no one else yet awake"
motifs = ["m.whisper_psola"]
carries = ["art-song-whisper"]
seeds_for = ["05_the_last_streetlamp", "16_the_small_hours"]

[targets]
tessitura_hz = [165, 360]
pitch_error_ceiling_cents = 2.0
vox_loudness_lufs = -18.0

[dsp]
bed_preset = "band_limit"
texture_preset = "silence"
sample_source = "none"

[praat]
script = "psola_retarget.praat"
pitch_method = "ac"
pitch_floor_hz = 65
pitch_ceiling_hz = 1000
very_accurate = true
formant_shift_ratio = 1.00
target_median_hz = 220
range_factor = 0.75
