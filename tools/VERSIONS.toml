# Pinned versions of the five core tools (April 2026).
# Used by scripts/bootstrap.sh and CI to enforce reproducibility.

[praat]
version = "6.4.x"
source = "brew --cask praat"

[mbrola]
version = "3.3+"
source = "https://github.com/numediart/MBROLA"
git_ref = "master"

[mbrola_voices]
source = "https://github.com/numediart/MBROLA-voices"
# us1/us3 are required for the English roster. us2 and en1 are nice-to-have
# and scripts/bootstrap.sh copies them opportunistically.
voices = ["us1", "us3", "us2", "en1"]

[opensmile]
version = "3.0.2"
source = "https://github.com/audeering/opensmile"
git_ref = "master"

[silero_vad]
version = "5.1+"
source = "pypi:silero-vad"

# csdr fork choice is platform-sensitive.
#
# The jketterl fork is the canonical modern target (C++17, CMake, multi-call
# binary, libsamplerate resampling) and builds cleanly on macOS arm64 with
# recent Apple clang. On Darwin x86_64 with macOS 26's Apple clang 16 the
# jketterl build has produced C++ errors in src/lib/exec.cpp and
# src/lib/ringbuffer.cpp (missing implicit <cstdint>/<cstring> includes).
# Rather than carry a fragile patch against upstream master, on that host and
# on Linux CI we fall back to ha7ilm's original pure-C Makefile build. The
# command surface overlaps enough for our graph DSL — see research/csdr.md
# for the fork-drift caveats.
#
# Override at bootstrap time with NADIR_CSDR_FORK=jketterl|ha7ilm.

[csdr]
default_fork = "jketterl"
linux_fork = "ha7ilm"

[csdr.fork.jketterl]
source = "https://github.com/jketterl/csdr"
git_ref = "master"
build = "cmake"
platforms = ["darwin-arm64"]

[csdr.fork.ha7ilm]
source = "https://github.com/ha7ilm/csdr"
git_ref = "master"
build = "make"
platforms = ["darwin-x86_64", "linux-x86_64", "linux-aarch64"]
