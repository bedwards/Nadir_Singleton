# Pinned versions of the five core tools (April 2026).
# Used by scripts/bootstrap.sh and CI to enforce reproducibility.

[praat]
version = "6.4.x"
source = "brew --cask praat"

[mbrola]
version = "3.3+"
source = "https://github.com/numediart/MBROLA"
git_ref = "master"

[mbrola_voices]
source = "https://github.com/numediart/MBROLA-voices"
# us1/us3 are required for the English roster. us2 and en1 are nice-to-have
# and scripts/bootstrap.sh copies them opportunistically.
voices = ["us1", "us3", "us2", "en1"]

[opensmile]
version = "3.0.2"
source = "https://github.com/audeering/opensmile"
git_ref = "master"

[silero_vad]
version = "5.1+"
source = "pypi:silero-vad"

# csdr fork choice.
#
# Default on every platform is ha7ilm/csdr: its pure-C Makefile build matches
# the ha7ilm-suffixed command names baked into nadir-dsp's presets
# (convert_s16_f, fir_interpolate_cc, bandpass_fir_fft_cc, …). The modern
# jketterl fork renames those blocks and is supported as an opt-in via
# NADIR_CSDR_FORK=jketterl. On Darwin x86_64 the jketterl path additionally
# applies scripts/patches/csdr-jketterl-macos-x86_64.patch, which
# substitutes shm_open+mmap for the Linux mremap ring-buffer trick, provides
# a sincosf shim, and swaps a VLA in exec.cpp for std::vector — all under
# `#ifdef __APPLE__`. See research/csdr.md for the fork-drift caveats.
#
# Override at bootstrap time with NADIR_CSDR_FORK=jketterl|ha7ilm.

[csdr]
default_fork = "jketterl"
linux_fork = "ha7ilm"

[csdr.fork.jketterl]
source = "https://github.com/jketterl/csdr"
git_ref = "master"
build = "cmake"
platforms = ["darwin-arm64", "darwin-x86_64"]

[csdr.fork.ha7ilm]
source = "https://github.com/ha7ilm/csdr"
git_ref = "master"
build = "make"
platforms = ["linux-x86_64", "linux-aarch64"]
